<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AS Level Economics Master Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
:root {
  --primary: #00e5ff;
  --accent:  #ff6b35;
  --gold:    #ffd700;
  --green:   #00ff88;
  --red:     #ff4757;
  --bg:      #080c14;
  --s2:      rgba(255,255,255,0.09);
  --bdr:     rgba(255,255,255,0.09);
  --text:    #f0f4ff;
  --muted:   #6b7a99;
  --card:    rgba(14,22,44,0.96);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 15% 15%, rgba(0,229,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 500px 700px at 85% 85%, rgba(157,80,187,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 280px; min-width: 280px; height: 100%;
  background: rgba(5,8,18,0.99);
  border-right: 1px solid var(--bdr);
  display: flex; flex-direction: column;
  z-index: 100; position: relative;
}

.sh { padding: 18px 14px 12px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.sh-title { font-size: .65rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--primary); margin-bottom: 11px; }
.search { display: flex; align-items: center; gap: 7px; background: var(--s2); border: 1px solid var(--bdr); border-radius: 10px; padding: 7px 11px; }
.search input { background: none; border: none; outline: none; color: var(--text); font-family: 'Syne',sans-serif; font-size: .8rem; width: 100%; }
.search input::placeholder { color: var(--muted); }

/* --- DROPDOWN LEADERBOARD CSS --- */
#leaderboard-zone {
  margin: 10px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--bdr); border-radius: 12px;
  flex-shrink: 0; overflow: hidden;
}
.lb-header {
  padding: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  background: rgba(255,255,255,0.02);
}
.lb-title { font-size: .55rem; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }

#lb-list {
  max-height: 0; overflow-y: auto; transition: max-height 0.3s ease-out; padding: 0 10px;
}
#lb-list.open {
  max-height: 180px; padding: 0 10px 10px 10px;
}
.lb-item { display: flex; justify-content: space-between; font-size: .7rem; font-family: 'JetBrains Mono', monospace; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

.prog-strip {
  padding: 9px 14px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; gap: 9px;
  font-size: .7rem; color: var(--muted);
  font-family: 'JetBrains Mono',monospace; flex-shrink: 0;
}
.prog-outer { flex: 1; height: 4px; background: var(--s2); border-radius: 99px; overflow: hidden; }
.prog-inner { height: 100%; background: linear-gradient(to right, var(--primary), var(--accent)); border-radius: 99px; transition: width .5s ease; width: 0%; }

#word-list { flex-grow: 1; overflow-y: auto; padding: 7px; scrollbar-width: thin; scrollbar-color: rgba(0,229,255,.25) transparent; border-bottom: 1px solid var(--bdr); }
.li { padding: 9px 13px; margin-bottom: 3px; border-radius: 10px; cursor: pointer; font-size: .78rem; transition: all .14s; display: flex; justify-content: space-between; align-items: center; color: var(--muted); border: 1px solid transparent; }
.li:hover { background: var(--s2); color: var(--text); }
.li.active { background: rgba(0,229,255,.1); border-color: rgba(0,229,255,.22); color: var(--primary); font-weight: 700; }
.li.done { color: #3dd68c; }
.li .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--s2); flex-shrink: 0; transition: background .3s; }
.li.done .dot { background: var(--green); }

.sf { padding: 13px 14px; border-top: 1px solid var(--bdr); flex-shrink: 0; }
.btn-reset { width: 100%; background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.28); color: var(--red); border-radius: 10px; padding: 9px; font-family: 'Syne',sans-serif; font-size: .72rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background .2s; }

/* ── MAIN ── */
#main { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; overflow-y: auto; }
.stats-bar { position: absolute; top: 18px; right: 18px; display: flex; gap: 7px; z-index: 10; }
.chip { background: rgba(12,20,40,.92); border: 1px solid var(--bdr); border-radius: 50px; padding: 6px 13px; font-size: .75rem; font-weight: 800; font-family: 'JetBrains Mono',monospace; backdrop-filter: blur(10px); white-space: nowrap; }
.chip .v { color: var(--primary); }
.chip.s .v { color: var(--accent); }
.chip.x .v { color: var(--gold); }
.rank-lbl { font-size: .6rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; text-align: center; opacity: .8; }

/* ── CARD ── */
.card { background: var(--card); border: 1px solid rgba(255,255,255,.1); border-radius: 26px; padding: 36px 40px 32px; width: 100%; max-width: 620px; box-shadow: 0 30px 80px rgba(0,0,0,.6); position: relative; }
.w-counter { position: absolute; top: 19px; right: 23px; font-size: .7rem; color: var(--muted); font-family: 'JetBrains Mono',monospace; }
.w-title { font-size: clamp(26px,4vw,46px); font-weight: 900; line-height: 1.1; margin-bottom: 5px; background: linear-gradient(135deg,#fff 40%,#94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.w-zh { font-size: .95rem; color: var(--muted); margin-bottom: 20px; letter-spacing: 1px; }

.keytag-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 14px; }
.keytag-lbl { font-size: .62rem; font-weight: 800; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.kt { background: rgba(255,215,0,.1); border: 1px solid rgba(255,215,0,.2); color: var(--gold); font-size: .68rem; font-weight: 700; padding: 3px 9px; border-radius: 50px; font-family: 'JetBrains Mono',monospace; }

textarea { display: block; width: 100%; height: 108px; background: rgba(0,0,0,.45); border: 2px solid rgba(255,255,255,.1); border-radius: 13px; color: var(--text); padding: 13px 15px; font-size: .92rem; font-family: 'Syne',sans-serif; line-height: 1.55; resize: none; margin-bottom: 16px; outline: none; transition: border-color .2s; }
textarea:focus { border-color: var(--primary); }
textarea::placeholder { color: var(--muted); font-size: .86rem; }

.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.btn-compare { grid-column: 1/-1; background: linear-gradient(135deg,#00c8e8,#007fa0); color: #080c14; border: none; border-radius: 13px; padding: 15px; font-family: 'Syne',sans-serif; font-size: .88rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: transform .2s, box-shadow .2s; }
.btn-compare:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,200,232,.3); }

.btn-nav { background: var(--s2); border: 1px solid var(--bdr); color: var(--muted); border-radius: 12px; padding: 11px 9px; font-family: 'Syne',sans-serif; font-size: .76rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .18s; }
.btn-nav:hover { color: var(--text); background: rgba(255,255,255,.12); }
.btn-nav:disabled { opacity: .22; cursor: not-allowed; }

/* ── GRADING ZONE ── */
@keyframes rise { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
#grading-zone { display: none; animation: rise .3s ease; }

.cov-row { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
.cov-lbl { font-size: .62rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.cov-outer { flex: 1; height: 6px; background: var(--s2); border-radius: 99px; overflow: hidden; }
.cov-inner { height: 100%; border-radius: 99px; width: 0%; transition: width .7s cubic-bezier(.34,1.56,.64,1); }
.cov-pct { font-family: 'JetBrains Mono',monospace; font-weight: 700; font-size: .8rem; min-width: 36px; text-align: right; }

.comp { background: rgba(0,0,0,.38); border: 1px solid var(--bdr); border-radius: 13px; padding: 13px 17px; margin-bottom: 11px; }
.comp-lbl { font-size: .6rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; }
.comp-lbl.yours { color: var(--primary); }
.comp-lbl.official { color: var(--accent); }
.comp-text { font-size: .9rem; line-height: 1.7; color: #d1d8ed; }
.kw-hit { background: rgba(0,255,136,.14); color: var(--green); border-radius: 4px; padding: 0 3px; font-weight: 700; }
.kw-miss { background: rgba(255,71,87,.14); color: #ff8a96; border-radius: 4px; padding: 0 3px; font-weight: 700; }

.score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 9px; }
.btn-ok { background: rgba(0,255,136,.12); border: 1px solid rgba(0,255,136,.28); color: var(--green); border-radius: 13px; padding: 13px 9px; font-family: 'Syne',sans-serif; font-size: .8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .18s; }
.btn-ok:hover { background: rgba(0,255,136,.22); transform: translateY(-2px); }
.btn-no { background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.26); color: var(--red); border-radius: 13px; padding: 13px 9px; font-family: 'Syne',sans-serif; font-size: .8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .18s; }
.btn-no:hover { background: rgba(255,71,87,.2); transform: translateY(-2px); }
.btn-edit { width: 100%; background: var(--s2); border: 1px solid var(--bdr); color: var(--muted); border-radius: 11px; padding: 10px; font-family: 'Syne',sans-serif; font-size: .75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .18s; }

/* ── MODALS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.78); backdrop-filter: blur(8px); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
.overlay.open { display: flex; }
.modal { background: #0b1528; border: 1px solid rgba(255,255,255,.1); border-radius: 24px; padding: 34px 30px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,.9); animation: rise .3s ease; }
.m-ico { font-size: 2.6rem; margin-bottom: 10px; }
.m-ttl { font-size: 1.3rem; font-weight: 900; margin-bottom: 9px; }
.m-body { color: var(--muted); font-size: .86rem; line-height: 1.7; margin-bottom: 24px; }
.m-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.mb { padding: 12px; border-radius: 12px; font-family: 'Syne',sans-serif; font-size: .8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; transition: all .18s; }
.mb.cancel { background: var(--s2); color: var(--muted); }
.mb.danger { background: var(--red); color: white; }
.mb.full { grid-column: 1/-1; background: linear-gradient(135deg,var(--primary),#007fa0); color: #080c14; }

/* ── MOBILE TOGGLE ── */
.menu-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 300; background: rgba(12,20,40,.92); border: 1px solid var(--bdr); border-radius: 10px; padding: 8px 13px; font-family: 'Syne',sans-serif; font-size: .72rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text); cursor: pointer; backdrop-filter: blur(10px); }

@media (max-width: 820px) {
  #sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); box-shadow: 40px 0 80px rgba(0,0,0,.8); transition: transform .3s ease; }
  #sidebar.open { transform: translateX(0); }
  .menu-toggle { display: block; }
  #main { padding: 75px 14px 18px; }
  .card { padding: 22px 18px 20px; border-radius: 20px; }
}
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰ 词汇库</button>

<div id="sidebar">
  <div class="sh">
    <div class="sh-title">AS Economics 词典</div>
    <div class="search">
      <span style="color:var(--muted);font-size:.85rem">🔍</span>
      <input type="text" placeholder="Search / 搜索..." oninput="filterWords(this.value)">
    </div>
  </div>

  <div id="leaderboard-zone">
    <div class="lb-header" onclick="toggleLeaderboard()">
      <div class="lb-title">🏆 Rankings 排行榜</div>
      <span id="lb-arrow" style="color:var(--gold); font-size: 0.6rem;">▼</span>
    </div>
    <div id="lb-list">Loading rankings...</div>
  </div>

  <div class="prog-strip">
    <div class="prog-outer"><div class="prog-inner" id="prog-fill"></div></div>
    <span id="prog-text">0 / 0</span>
  </div>
  <div id="word-list"></div>
  <div class="sf">
    <button class="btn-reset" onclick="openModal('m-reset')">🔄 重新开始 · Reset All</button>
  </div>
</div>

<div id="main">
  <div class="stats-bar">
    <div class="chip s">🔥 <span class="v" id="s-val">0</span></div>
    <div class="chip x">⭐ <span class="v" id="x-val">0</span> XP</div>
  </div>

  <div class="rank-lbl" id="rank-lbl">NOVICE ECONOMIST · 经济学新手</div>

  <div class="card" id="main-card">
    <div class="w-counter" id="w-counter">1 / 30</div>

    <div id="quiz-ui">
      <div class="w-title" id="w-title">Loading...</div>
      <div class="w-zh" id="w-zh"></div>
      <div class="keytag-row" id="kt-row" style="display:none">
        <span class="keytag-lbl">🔑 关键词:</span>
        <span id="kt-tags"></span>
      </div>
      <textarea id="user-input" placeholder="Write your definition here... 在这里写你的定义..."></textarea>
      <div class="btn-row">
        <button class="btn-compare" onclick="revealDef()">📖 Check Definitions · 比较定义</button>
        <button class="btn-nav" id="btn-prev" onclick="goTo(currentIndex-1)">← Prev 上一个</button>
        <button class="btn-nav" id="btn-next" onclick="goTo(currentIndex+1)">Next 下一个 →</button>
      </div>
    </div>

    <div id="grading-zone">
      <div class="w-title" id="g-title"></div>
      <div class="w-zh" id="g-zh" style="margin-bottom:18px"></div>

      <div class="cov-row">
        <span class="cov-lbl">关键词覆盖 Coverage</span>
        <div class="cov-outer"><div class="cov-inner" id="cov-fill"></div></div>
        <span class="cov-pct" id="cov-pct">0%</span>
      </div>

      <div class="comp">
        <div class="comp-lbl yours">✏️ Your Answer · 你的答案</div>
        <div class="comp-text" id="your-answer"></div>
      </div>

      <div class="comp">
        <div class="comp-lbl official">📘 Official Definition · 官方定义</div>
        <div class="comp-text" id="off-def"></div>
      </div>

      <div class="score-row">
        <button class="btn-ok" onclick="handleScore(true)">✅ Nailed It! 答对了!</button>
        <button class="btn-no" onclick="handleScore(false)">❌ Try Again 再试试</button>
      </div>
      <button class="btn-edit" onclick="backToInput()">✏️ Edit Answer · 修改答案</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-reset">
  <div class="modal">
    <div class="m-ico">🔄</div>
    <div class="m-ttl">Reset Everything?</div>
    <div class="m-body">This will erase all your progress.</div>
    <div class="m-btns">
      <button class="mb cancel" onclick="closeModal('m-reset')">Cancel</button>
      <button class="mb danger" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div class="overlay" id="m-done">
  <div class="modal">
    <div class="m-ico">🏆</div>
    <div class="m-ttl">全部完成! All Done!</div>
    <div class="m-btns">
      <button class="mb full" onclick="startOver()">🔄 Start Fresh</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys8Z1NnytOFPE6wgbj_LagCmhkWM0gd5njwYbZ8jbnWE6yVsy-caPvx2xnJPuWbGYK/exec";

// ─── VOCAB DATA ───────────────────────────────────────────
const vocab = [
{word:"Absolute Advantage",zh:"绝对优势",def:"The ability of a country to produce more of a good than another country using the same quantity of resources.",keys:["produce more","same resources","country","efficiency"]},
{word:"Ad Valorem Tax",zh:"从价税",def:"An indirect tax charged as a percentage of the value of a good or service.",keys:["percentage","value","indirect tax","price"]},
{word:"Adam Smith",zh:"亚当·斯密",def:"An economist who developed the theory of free markets and the division of labour.",keys:["free market","division of labour","economist","theory"]},
{word:"Adverse Selection",zh:"逆向选择",def:"A situation arising from asymmetric information where higher-risk individuals are more likely to participate in a transaction.",keys:["asymmetric information","high risk","market failure","information"]},
{word:"Aggregate Demand",zh:"总需求",def:"The total demand for goods and services in an economy at a given price level and time period.",keys:["total demand","economy","price level","spending"]},
{word:"Aggregate Supply",zh:"总供给",def:"The total output of goods and services that firms are willing and able to produce in an economy.",keys:["total output","firms","produce","economy"]},
{word:"Appreciation",zh:"升值",def:"An increase in the value of a currency in terms of another currency in a floating exchange rate system.",keys:["currency value","increase","exchange rate","floating"]},
{word:"Average Product",zh:"平均产量",def:"Output per unit of labour, calculated by dividing total output by the number of workers.",keys:["output per worker","total output","labour","average"]},
{word:"Balance of Payments",zh:"国际收支",def:"A record of all economic transactions between residents of a country and the rest of the world over a period of time.",keys:["record","transactions","rest of world","period"]},
{word:"Balance of Trade",zh:"贸易收支",def:"The difference between the value of a country's exports and imports of goods.",keys:["exports","imports","difference","goods"]},
{word:"Barter",zh:"以物易物",def:"The direct exchange of goods and services without the use of money.",keys:["no money","exchange","goods","services"]},
{word:"Capital",zh:"资本",def:"Man-made resources used in the production of goods and services, such as machinery and equipment.",keys:["man-made","production","machinery","resources"]},
{word:"Change in Demand",zh:"需求变动",def:"A shift of the demand curve caused by factors other than price.",keys:["shift","demand curve","non-price","factors"]},
{word:"Change in Quantity Demanded",zh:"需求量变动",def:"A movement along the demand curve caused by a change in the price of the good.",keys:["movement","price change","along curve","quantity"]},
{word:"Command Economy",zh:"计划经济",def:"An economic system where resource allocation is determined by the government.",keys:["government","allocation","central planning","system"]},
{word:"Comparative Advantage",zh:"比较优势",def:"The ability of a country to produce a good at a lower opportunity cost than another country.",keys:["opportunity cost","lower","trade","specialisation"]},
{word:"Complementary Goods",zh:"互补品",def:"Goods that are used together, where an increase in the price of one leads to a decrease in demand for the other.",keys:["used together","price effect","joint demand","related"]},
{word:"Consumer Surplus",zh:"消费者剩余",def:"The difference between what consumers are willing to pay and what they actually pay.",keys:["willingness to pay","actual price","benefit","difference"]},
{word:"Cost-benefit Analysis",zh:"成本收益分析",def:"A method of evaluating a project by comparing its total expected costs with its total expected benefits.",keys:["compare","costs","benefits","decision"]},
{word:"Cost-push Inflation",zh:"成本推动型通胀",def:"Inflation caused by increases in the costs of production, such as wages or raw materials.",keys:["cost increase","wages","inputs","inflation"]},
{word:"Cross Elasticity of Demand",zh:"需求交叉弹性",def:"A measure of how the quantity demanded of one good responds to a change in the price of another good.",keys:["related goods","price change","responsiveness","demand"]},
{word:"Current Account",zh:"经常账户",def:"The part of the balance of payments that records trade in goods and services, income, and current transfers.",keys:["trade","income","transfers","BOP"]},
{word:"Demand-pull Inflation",zh:"需求拉动型通胀",def:"Inflation caused by an increase in aggregate demand exceeding aggregate supply.",keys:["aggregate demand","exceeds supply","inflation","pressure"]},
{word:"Demerit Goods",zh:"劣等品",def:"Goods that are over-consumed and generate negative externalities, often due to lack of information.",keys:["overconsumption","negative externality","information failure","harmful"]},
{word:"Depreciation",zh:"贬值",def:"A fall in the value of a currency in a floating exchange rate system.",keys:["currency","fall","exchange rate","market"]},
{word:"Division of Labour",zh:"劳动分工",def:"The specialization of workers in particular tasks to increase efficiency and output.",keys:["specialisation","efficiency","tasks","output"]},
{word:"Economic Growth",zh:"经济增长",def:"An increase in the productive capacity of an economy, usually measured by real GDP.",keys:["increase","capacity","real GDP","output"]},
{word:"Economic Problem",zh:"经济问题",def:"The problem of allocating scarce resources to satisfy unlimited wants.",keys:["scarcity","allocation","resources","wants"]},
{word:"Elasticity",zh:"弹性",def:"A measure of the responsiveness of one variable to a change in another variable.",keys:["responsiveness","change","measure","variables"]},
{word:"Enterprise",zh:"企业才能",def:"The factor of production involving risk-taking and decision-making in organizing production.",keys:["risk","decision-making","organisation","production"]},
{word:"Equilibrium",zh:"均衡",def:"A situation where there is no tendency for change because opposing forces are balanced.",keys:["balance","no change","market","forces"]},

// ─── STATE ────────────────────────────────────────────────
let xp = 0, streak = 0, mastered = [], currentIndex = 0, studentName = "";

// ─── PERSISTENCE ──────────────────────────────────────────
function loadState() {
  try {
    xp          = parseInt(localStorage.getItem('ec_xp'))    || 0;
    streak      = parseInt(localStorage.getItem('ec_str'))   || 0;
    mastered    = JSON.parse(localStorage.getItem('ec_mst')) || [];
    studentName = localStorage.getItem('ec_name')            || "";
  } catch(e) { xp = 0; streak = 0; mastered = []; }
}

function saveState() {
  localStorage.setItem('ec_xp',  xp);
  localStorage.setItem('ec_str', streak);
  localStorage.setItem('ec_mst', JSON.stringify(mastered));
}

// ─── GOOGLE SHEETS SYNC ───────────────────────────────────
// Syncs once at the end, and as a safety net on tab close.
async function syncXP() {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ name: studentName, xp: xp })
    });
    setTimeout(refreshLeaderboard, 2500);
  } catch(e) { console.error("Sync Error", e); }
}

// Safety net: if student closes the tab before finishing,
// sendBeacon fires a final XP update silently in the background.
window.addEventListener('beforeunload', () => {
  navigator.sendBeacon(SCRIPT_URL, JSON.stringify({ name: studentName, xp: xp }));
});

async function refreshLeaderboard() {
  const lb = document.getElementById('lb-list');
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();

    let scores = {};
    data.slice(1).forEach(row => {
      let name = row[1], val = parseInt(row[2]);
      if (!scores[name] || val > scores[name]) scores[name] = val;
    });

    let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 15);
    lb.innerHTML = sorted.map((s, i) => `
      <div class="lb-item">
        <span>${i + 1}. ${s[0]}</span>
        <span style="color:var(--gold)">${s[1]} XP</span>
      </div>
    `).join('');
  } catch(e) {
    lb.innerHTML = "<div style='padding:6px 0;font-size:.7rem;color:var(--muted)'>Offline</div>";
  }
}

// ─── LEADERBOARD TOGGLE ───────────────────────────────────
function toggleLeaderboard() {
  const lb    = document.getElementById('lb-list');
  const arrow = document.getElementById('lb-arrow');
  lb.classList.toggle('open');
  arrow.textContent = lb.classList.contains('open') ? '▲' : '▼';
}

// ─── SIDEBAR LIST ─────────────────────────────────────────
function buildList() {
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  vocab.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'li' + (mastered.includes(item.word) ? ' done' : '');
    d.id = 'li' + i;
    d.innerHTML = '<span>' + item.word + '</span><div class="dot"></div>';
    d.onclick = () => { goTo(i); if (window.innerWidth < 820) closeSidebar(); };
    list.appendChild(d);
  });
  updateProgress();
}

function filterWords(q) {
  const ql = q.toLowerCase();
  vocab.forEach((item, i) => {
    const el = document.getElementById('li' + i);
    if (el) el.style.display = (item.word.toLowerCase().includes(ql) || item.zh.includes(q)) ? '' : 'none';
  });
}

// ─── NAVIGATION ───────────────────────────────────────────
// syncXP() is NOT called here — navigation is free
function goTo(idx) {
  if (idx < 0 || idx >= vocab.length) return;
  currentIndex = idx;
  const item = vocab[idx];

  document.querySelectorAll('.li').forEach(e => e.classList.remove('active'));
  const li = document.getElementById('li' + idx);
  if (li) { li.classList.add('active'); li.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  document.getElementById('w-title').textContent   = item.word;
  document.getElementById('w-zh').textContent      = item.zh;
  document.getElementById('w-counter').textContent = (idx + 1) + ' / ' + vocab.length;

  const ktRow  = document.getElementById('kt-row');
  const ktSpan = document.getElementById('kt-tags');
  if (item.keys && item.keys.length) {
    ktSpan.innerHTML    = item.keys.map(k => '<span class="kt">' + k + '</span>').join(' ');
    ktRow.style.display = 'flex';
  } else { ktRow.style.display = 'none'; }

  document.getElementById('user-input').value = '';
  showQ();
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === vocab.length - 1);
}

function showQ() {
  document.getElementById('quiz-ui').style.display      = 'block';
  document.getElementById('grading-zone').style.display = 'none';
}

// ─── REVEAL & GRADE ───────────────────────────────────────
function revealDef() {
  const userIn = document.getElementById('user-input').value.trim();
  const item   = vocab[currentIndex];

  document.getElementById('g-title').textContent     = item.word;
  document.getElementById('g-zh').textContent        = item.zh;
  document.getElementById('your-answer').textContent = userIn || '(no answer · 未填写)';

  const low  = userIn.toLowerCase();
  let   html = item.def;
  (item.keys || []).forEach(k => {
    const m   = low.includes(k.toLowerCase());
    const cls = m ? 'kw-hit' : 'kw-miss';
    const esc = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    html = html.replace(new RegExp('(' + esc + ')', 'gi'), '<span class="' + cls + '">$1</span>');
  });
  document.getElementById('off-def').innerHTML = html;

  const keys = item.keys || [];
  const pct  = keys.length
    ? Math.round((keys.filter(k => low.includes(k.toLowerCase())).length / keys.length) * 100)
    : 100;

  const fill  = document.getElementById('cov-fill');
  const pctEl = document.getElementById('cov-pct');
  pctEl.textContent     = pct + '%';
  fill.style.width      = pct + '%';
  const color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--gold)' : 'var(--red)';
  fill.style.background = color;
  pctEl.style.color     = color;

  document.getElementById('quiz-ui').style.display      = 'none';
  document.getElementById('grading-zone').style.display = 'block';
}

// ─── SCORING ──────────────────────────────────────────────
function handleScore(correct) {
  const item = vocab[currentIndex];

  if (correct) {
    streak++;
    xp += 20;
    if (!mastered.includes(item.word)) {
      mastered.push(item.word);
      const li = document.getElementById('li' + currentIndex);
      if (li) {
        li.classList.add('done');
        li.querySelector('.dot').style.background = 'var(--green)';
      }
    }
    confetti({ particleCount: 110, spread: 65, origin: { y: .7 }, colors: ['#00e5ff','#00ff88','#ffd700'] });
  } else {
    streak = 0;
  }

  saveState();
  updateStats();
  updateProgress();

  const isLastWord = currentIndex === vocab.length - 1;

  if (!isLastWord) {
    // Mid-session: just move on, no sheet write
    setTimeout(() => goTo(currentIndex + 1), 600);
  } else {
    // Final word: write to Google Sheet once
    syncXP();
    setTimeout(showDone, 700);
  }
}

function backToInput() { showQ(); }

// ─── UI HELPERS ───────────────────────────────────────────
function updateStats() {
  document.getElementById('x-val').textContent = xp;
  document.getElementById('s-val').textContent = streak;
  const ranks = [
    [0,    'NOVICE ECONOMIST · 经济学新手'],
    [200,  'MARKET ANALYST · 市场分析师'],
    [600,  'POLICY ADVISOR · 政策顾问'],
    [1200, 'CENTRAL BANK GOVERNOR · 央行行长'],
    [2500, 'GLOBAL ECONOMIC LEGEND · 经济学传奇']
  ];
  let rank = ranks[0][1];
  for (const [t, l] of ranks) { if (xp >= t) rank = l; }
  document.getElementById('rank-lbl').textContent = rank;
}

function updateProgress() {
  const done = mastered.length, total = vocab.length;
  document.getElementById('prog-fill').style.width = (total ? (done / total * 100) : 0) + '%';
  document.getElementById('prog-text').textContent = done + ' / ' + total;
}

function toggleSidebar()  { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar()   { document.getElementById('sidebar').classList.remove('open'); }
function openModal(id)    { document.getElementById(id).classList.add('open'); }
function closeModal(id)   { document.getElementById(id).classList.remove('open'); }

function confirmReset() {
  xp = 0; streak = 0; mastered = [];
  localStorage.removeItem('ec_name');
  saveState(); buildList(); goTo(0); updateStats();
  closeModal('m-reset');
  location.reload();
}

function showDone() {
  openModal('m-done');
  confetti({ particleCount: 300, spread: 120, origin: { y: .5 } });
}

function startOver() {
  mastered = []; saveState(); buildList(); goTo(0); updateStats();
  closeModal('m-done');
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
  if (e.key === 'Enter' && document.getElementById('grading-zone').style.display !== 'block') revealDef();
});

// ─── INIT ─────────────────────────────────────────────────
function init() {
  loadState();
  if (!studentName) {
    studentName = prompt("Enter your name for the leaderboard / 输入你的名字:");
    if (!studentName) studentName = "Anonymous";
    localStorage.setItem('ec_name', studentName);
  }
  buildList();
  goTo(0);
  updateStats();
  refreshLeaderboard();
}

window.onload = init;
</script>
</body>
</html>
